version: '3.8'

services:
  mongo:
    image: mongo:6.0
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 5s
      timeout: 5s
      retries: 12

  seed-dev:
    image: node:20-alpine3.19
    working_dir: /backend
    volumes:
      - ./:/backend
      - backend-node-modules:/backend/node_modules
    env_file:
      - .env.development
    command: ["npm", "run", "seed:dev","--","--wipe"]
    depends_on:
      mongo:
        condition: service_healthy

  api:
    build:
      context: .
      dockerfile: Dockerfile.dev
    working_dir: /backend
    env_file:
      - .env.development
    command: ["npm", "run", "dev"]
    ports:
      - "5050:5000"
    volumes:
      - ./:/backend
      - backend-node-modules:/backend/node_modules
    depends_on:
      mongo:
        condition: service_healthy
      seed-dev:
        condition: service_completed_successfully

volumes:
  mongo-data:
  backend-node-modules:
