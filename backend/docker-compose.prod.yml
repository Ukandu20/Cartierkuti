services:
  api:
    image: cartierkuti/backend-api:prod
    env_file:
      - .env.production
    ports:
      - "5050:5000"
    depends_on:
      mongo:
        condition: service_healthy

  mongo:
    image: mongo:6.0
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 5s
      timeout: 5s
      retries: 12

volumes:
  mongo-data:


