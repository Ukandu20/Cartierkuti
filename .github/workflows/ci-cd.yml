name: CI / CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Use Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install backend dependencies
        working-directory: backend
        run: npm ci

      - name: Run backend tests
        working-directory: backend
        env:
          NODE_ENV: test
        run: npm test

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Run frontend tests
        working-directory: frontend
        env:
          VITE_API_URL: http://localhost:5050
          VITE_SITE_URL: http://localhost:5173
        run: npm test

      - name: Build frontend
        working-directory: frontend
        env:
          VITE_API_URL: http://localhost:5050
          VITE_SITE_URL: http://localhost:5173
        run: npm run build

  docker:
    needs: build-test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: |
            ghcr.io/ukandu20/backend-api:latest
            ghcr.io/ukandu20/backend-api:${{ github.sha }}

  seed-production:
    needs: docker
    runs-on: ubuntu-latest
    steps:
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Pull prod image
        run: docker pull ghcr.io/ukandu20/backend-api:latest

      - name: Run production seeder
        run: |
          docker run --rm \
            -e NODE_ENV=production \
            -e MONGODB_URI="${{ secrets.MONGODB_URI }}" \
            -e ADMIN_USERNAME="${{ secrets.ADMIN_USERNAME }}" \
            -e ADMIN_PASSWORD_HASH="${{ secrets.ADMIN_PASSWORD_HASH }}" \
            -e JWT_SECRET="${{ secrets.JWT_SECRET }}" \
            -e ADMIN_TOKEN_TTL="${{ secrets.ADMIN_TOKEN_TTL }}" \
            ghcr.io/ukandu20/backend-api:latest \
            npm run seed:prod

  deploy:
    needs: seed-production
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Render deploy via API
        env:
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
          RENDER_SERVICE_ID: ${{ secrets.RENDER_SERVICE_ID }}
        run: |
          curl -X POST "https://api.render.com/deploys" \
            -H "Accept: application/json" \
            -H "Authorization: Bearer $RENDER_API_KEY" \
            -H "Content-Type: application/json" \
            -d '{"serviceId":"'"$RENDER_SERVICE_ID"'"}'
